<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brawl Stars Stats</title>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a1d; color: #e0e0e0; padding: 20px; }
      .container { max-width: 600px; margin: auto; }
      input { padding: 10px; width: 70%; border-radius: 6px; border: none; }
      button { padding: 10px 16px; background: #ffaa00; color: #000; border: none; border-radius: 6px; cursor: pointer; }
      #result { margin-top: 24px; }
      .stat-card { background: #2a2a30; padding: 16px; border-radius: 8px; margin-bottom: 12px; }
      .label { color: #888; font-size: 0.9em; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Статистика Brawl Stars</h1>
      <p>Введите тег игрока (например, #ABC123456):</p>
      <input id="playerTag" type="text" placeholder="#..." />
      <button onclick="loadStats()">Получить статистику</button>
      <div id="result"></div>
    </div>

    <script>
      async function loadStats() {
        const tag = document.getElementById('playerTag').value.trim().replace('#', '');
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '<p>Загрузка...</p>';

        try {
          // Замените на актуальный эндпоинт и ключ, если API требует ключ
          const res = await fetch(`https://api.brawlapi.club/v1/player/${tag}`);
          const data = await res.json();

          if (!res.ok || data.error) {
            resultDiv.innerHTML = `<p style="color:#ff5555">Не удалось найти игрока или ошибка API.</p>`;
            return;
          }

          resultDiv.innerHTML = `
            <div class="stat-card">
              <h2>${data.name}</h2>
              <p class="label">Трофеи: ${data.trophies}</p>
              <p class="label">Максимальный ранг: ${data.highestTrophies}</p>
              <p class="label">Клуб: ${data.club?.name || 'Нет клуба'}</p>
              <p class="label">Уровень силы: ${data.expLevel}</p>
            </div>
          `;
        } catch (e) {
          resultDiv.innerHTML = `<p style="color:#ff5555">Ошибка: ${e.message}</p>`;
        }
      }
    </script>
  </body>
</html>
