<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Визитка</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --panel:#12121a;
      --panel2:#0f0f16;
      --text:#f3f3f5;
      --muted:#b8b8c2;
      --red:#ff2a2a;
      --red2:#b60000;
      --line:rgba(255,42,42,.28);
      --shadow: 0 18px 60px rgba(0,0,0,.55);
      --radius:22px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(255,42,42,.18), transparent 60%),
        radial-gradient(700px 400px at 80% 30%, rgba(182,0,0,.16), transparent 55%),
        radial-gradient(600px 380px at 50% 95%, rgba(255,42,42,.10), transparent 50%),
        linear-gradient(180deg, #070709 0%, var(--bg) 100%);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 14px;
    }

    .wrap{
      width:min(980px, 100%);
      display:grid;
      grid-template-columns: 1.05fr .95fr;
      gap:18px;
    }

    @media (max-width: 880px){
      .wrap{grid-template-columns:1fr}
    }

    .card{
      background: linear-gradient(180deg, rgba(255,42,42,.07), rgba(255,42,42,.02)) , var(--panel);
      border:1px solid rgba(255,42,42,.22);
      border-radius:var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(700px 200px at 20% 0%, rgba(255,42,42,.22), transparent 60%),
        radial-gradient(500px 200px at 90% 10%, rgba(182,0,0,.22), transparent 60%);
      pointer-events:none;
      opacity:.65;
      filter:saturate(120%);
    }

    .card > * { position:relative; }

    .left{
      padding:26px 24px 22px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
    }

    .logo{
      width:44px;
      height:44px;
      border-radius:14px;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,42,42,.85), rgba(255,42,42,.18) 55%, transparent 60%),
        linear-gradient(135deg, rgba(255,42,42,.35), rgba(182,0,0,.25));
      border:1px solid rgba(255,42,42,.35);
      box-shadow: 0 14px 34px rgba(255,42,42,.15);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      letter-spacing:.5px;
    }

    h1{
      margin:0;
      font-size:18px;
      line-height:1.2;
    }
    .sub{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .hero{
      display:flex;
      gap:18px;
      align-items:flex-start;
      margin-top:10px;
      padding-top:10px;
    }

    .title-block{
      flex:1;
    }

    .big{
      margin:0 0 8px;
      font-size:30px;
      letter-spacing:.2px;
    }
    .accent{
      color:var(--red);
    }

    .desc{
      margin:0;
      color:var(--muted);
      line-height:1.55;
      font-size:14.5px;
      max-width:54ch;
    }

    .actions{
      margin-top:18px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    @media (max-width: 520px){
      .actions{grid-template-columns:1fr}
    }

    .btn{
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid rgba(255,42,42,.22);
      background: linear-gradient(180deg, rgba(255,42,42,.09), rgba(255,42,42,.03));
      color:var(--text);
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      user-select:none;
      min-height:44px;
      position:relative;
      overflow:hidden;
    }

    .btn::after{
      content:"";
      position:absolute;
      inset:-2px;
      background: radial-gradient(240px 60px at 20% 10%, rgba(255,42,42,.35), transparent 55%);
      opacity:0;
      transition: opacity .15s ease;
      pointer-events:none;
    }

    .btn:hover{
      transform: translateY(-2px);
      border-color: rgba(255,42,42,.55);
      background: linear-gradient(180deg, rgba(255,42,42,.14), rgba(255,42,42,.04));
    }
    .btn:hover::after{opacity:1}

    .icon{
      width:18px;
      height:18px;
      display:inline-block;
      filter: drop-shadow(0 8px 16px rgba(255,42,42,.10));
    }

    .right{
      padding:22px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .cover{
      background: linear-gradient(180deg, rgba(255,42,42,.08), rgba(255,42,42,.02));
      border:1px solid rgba(255,42,42,.25);
      border-radius:18px;
      padding:14px;
      display:grid;
      grid-template-columns: 120px 1fr;
      gap:14px;
      align-items:center;
    }

    .cover img{
      width:120px;
      height:120px;
      border-radius:16px;
      object-fit:cover;
      border:1px solid rgba(255,42,42,.35);
      box-shadow: 0 18px 55px rgba(0,0,0,.55);
      background:#14141f;
    }

    .track h2{
      margin:0 0 6px;
      font-size:18px;
      line-height:1.25;
    }

    .track .artist{
      margin:0;
      color:var(--muted);
      font-size:13.5px;
      line-height:1.4;
    }

    .track .meta{
      margin-top:10px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      padding:7px 10px;
      border-radius:999px;
      border:1px solid rgba(255,42,42,.20);
      background: rgba(255,42,42,.06);
      color: rgba(255,255,255,.92);
      font-size:12.5px;
    }

    .player{
      border-radius:18px;
      border:1px solid rgba(255,42,42,.20);
      background: rgba(0,0,0,.20);
      padding:14px;
    }

    .player .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }

    .player .label{
      color:var(--muted);
      font-size:13px;
    }

    audio{
      width:100%;
      filter: drop-shadow(0 14px 26px rgba(255,42,42,.08));
    }

    .footer-note{
      color:var(--muted);
      font-size:12.5px;
      line-height:1.4;
      padding:2px 2px 0;
    }
    .divider{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(255,42,42,.45), transparent);
      margin:6px 0 0;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card left">
      <div class="brand">
        <div class="logo">NI</div>
        <div>
          <h1>Niko52x - визитка</h1>
        </div>
      </div>

      <div class="hero">
        <div class="title-block">
          <p class="big">Связь со мной в один клик<span class="accent">.</span></p>
          <p class="desc">
            Нажимай на кнопку — откроется нужный канал.
          </p>

          <div class="actions">
            <!-- Telegram -->
            <a class="btn" href="https://t.me/niko52x" target="_blank" rel="noopener">
              <span class="icon" aria-hidden="true">✈️</span>
              Telegram
            </a>

            <!-- VK -->
            <a class="btn" href="https://vk.com/id1108856687" target="_blank" rel="noopener">
              <span class="icon" aria-hidden="true">🅥</span>
              ВКонтакте
            </a>

            <!-- Email -->
            <a class="btn" href="mailto:roglovskiy06@bk.ru">
              <span class="icon" aria-hidden="true">✉️</span>
              Почта
            </a>
          </div>

          <div class="divider"></div>
        </div>
      </div>
    </section>

    <section class="card right">
      <!-- Обложка -->
      <div class="cover">
        <img
          src="cover.jpg"
          alt="Обложка песни"
        />
        <div class="track">
          <h2>Название песни: <span class="accent">Тамагочи</span></h2>
          <p class="artist">Исполнитель: <span>лил кидд</span></p>
          <div class="meta">
          </div>
        </div>
      </div>

      <!-- Аудио (по желанию) -->
      <div class="player">
        <div class="row">
        </div>
        <audio controls>
          <source src="song.mp3" type="audio/mpeg">
          Ваш браузер не поддерживает аудио.
        <div class="footer-note" style="margin-top:10px;">
        </div>
      </div>
    </section>
  </main>
</body>
</html>
